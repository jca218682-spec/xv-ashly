<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Años de Ashly</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- ===================== PANTALLA DE BIENVENIDA ===================== -->
<div id="welcome">
  <div class="overlay-box" id="abrirInvitacion">
    <h2 class="titulo-bienvenida">Bienvenidos a la invitación de Ashly</h2>
  </div>
</div>

<!-- ===================== CONTENIDO ===================== -->
<div id="contenido" style="display:none;">

  <!-- Bloque 1: Foto -->
  <section class="block foto">
    <img src="img/Background.png" alt="Ashly" class="hero">
<div class="scroll-down">
    &#8964;
</div>
</section>

<section class="block texto"></section>

<!-- Bloque 2: de texto principal con fondo PNG -->
<section class="block texto"></section>

  <!-- Bloque 3: Contador -->
  <section class="block countdown">
    
    <h2>Faltan</h2>

    <div id="countdown">

      <div><span id="dias">00</span><p>Días</p></div>

      <div><span id="horas">00</span><p>Horas</p></div>

      <div><span id="minutos">00</span><p>Minutos</p></div>

      <div><span id="segundos">00</span><p>Segundos</p></div>

    </div>

  </section>

  <!-- Bloque 4: Detalles del evento -->
<section class="block portada-container">

    <img src="img/Salon.png" class="portada-evento" alt="Salón">

    <div class="detalle-portada">

        <a href="https://maps.app.goo.gl/KrzEHran5ErEPu28A"

           class="boton"

           target="_blank">

            Cómo llegar

        </a>

    </div>

</section>
    
 <!-- Bloque 5: Confirmación -->
<section class="block confirmacion">

    <img src="img/Confirmacion.png"

         class="confirmacion-portada"

         alt="Confirmación">

    <div class="confirmacion-contenido">

        <a href="https://forms.gle/h96qhy5rSNsk8Upw6"

           class="boton-confirmacion"

           target="_blank">

            Aqui

        </a>

    </div> 
</section>
    
  <!-- Bloque 6: Papás y padrinos -->
  <section class="block padres">
    <h3>Papás</h3>
    <p>Juan Cadena<br>Verónica Gómez</p>
    <h3>Padrinos</h3>
    <p>Yemina Cadena<br>José Ponce</p>
  </section>

</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
